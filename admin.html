<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapFix Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
        .login-container { display: flex; align-items: center; justify-content: center; height: 100vh; background: #1B2B5E; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 400px; }
        .login-input { width: 100%; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 16px; }
        .login-btn { width: 100%; padding: 12px; background: #FF6535; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .header { background: #1B2B5E; color: white; padding: 16px 24px; display: flex; justify-content: space-between; }
        .logout-btn { padding: 8px 16px; background: #FF6535; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .container { display: flex; height: calc(100vh - 60px); }
        .sessions-list { width: 320px; background: white; border-right: 1px solid #e5e7eb; overflow-y: auto; }
        .session-item { padding: 16px; border-bottom: 1px solid #e5e7eb; cursor: pointer; }
        .session-item:hover { background: #f9fafb; }
        .session-item.active { background: #eff6ff; border-left: 3px solid #FF6535; }
        .chat-container { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 16px 24px; border-bottom: 1px solid #e5e7eb; background: #f9fafb; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 24px; background: #f9fafb; }
        .message { margin-bottom: 16px; display: flex; gap: 12px; }
        .message.user { flex-direction: row-reverse; }
        .message-bubble { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; }
        .message.user .message-bubble { background: #FF6535; color: white; }
        .message.bot .message-bubble, .message.admin .message-bubble { background: white; border: 1px solid #e5e7eb; }
        .message.admin .message-bubble { background: #1B2B5E; color: white; }
        .chat-input-area { padding: 16px 24px; border-top: 1px solid #e5e7eb; }
        .chat-input-form { display: flex; gap: 12px; }
        .chat-input { flex: 1; padding: 12px; border: 1px solid #e5e7eb; border-radius: 8px; }
        .send-btn { padding: 12px 24px; background: #FF6535; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #9ca3af; }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h2>SnapFix Admin</h2>
            <input type="password" id="passwordInput" class="login-input" placeholder="Password" />
            <button id="loginBtn" class="login-btn">Login</button>
        </div>
    </div>
    <div id="adminPanel" style="display: none;">
        <div class="header">
            <h1>Live Chat</h1>
            <button class="logout-btn" onclick="location.reload()">Logout</button>
        </div>
        <div class="container">
            <div class="sessions-list" id="sessionsList"></div>
            <div class="chat-container" id="chatArea">
                <div class="empty-state">Select a chat</div>
            </div>
        </div>
    </div>
    <script>
        const c=window.supabase.createClient("https://japlrtlpopefvgkecpif.supabase.co","sb_publishable_9OnHkGpoUUG5dj7FDsnI-g_zwsjgpqG");
        let cur=null,sess={};
        document.getElementById("loginBtn").onclick=()=>{if(document.getElementById("passwordInput").value==="snapfix2026"){document.getElementById("loginScreen").style.display="none";document.getElementById("adminPanel").style.display="block";load()}};
        async function load(){const {data}=await c.from("chat_messages").select("*").order("created_at");sess={};data?.forEach(m=>{if(!sess[m.session_id])sess[m.session_id]=[];sess[m.session_id].push(m)});render();if(cur)sel(cur)}
        function render(){document.getElementById("sessionsList").innerHTML=Object.keys(sess).map(id=>`<div class="session-item ${cur===id?"active":""}" onclick="sel('${id}')"><div style="font-size:12px">${id.substring(0,12)}...</div><div style="font-size:14px;margin-top:4px">${sess[id][sess[id].length-1].message.substring(0,50)}</div></div>`).join("")||'<div class="empty-state">No chats</div>'}
        function sel(id){cur=id;render();const msgs=sess[id]||[];document.getElementById("chatArea").innerHTML=`<div class="chat-header">Session: ${id}</div><div class="chat-messages" id="msgs">${msgs.map(m=>`<div class="message ${m.sender}"><div class="message-bubble">${esc(m.message)}</div></div>`).join("")}</div><div class="chat-input-area"><form class="chat-input-form" onsubmit="send(event)"><input class="chat-input" id="rep" placeholder="Reply..."/><button class="send-btn" type="submit">Send</button></form></div>`;document.getElementById("msgs").scrollTop=999999}
        async function send(e){e.preventDefault();const msg=document.getElementById("rep").value.trim();if(!msg)return;await c.from("chat_messages").insert({session_id:cur,message:msg,sender:"admin"});document.getElementById("rep").value="";await load()}
        function esc(t){const d=document.createElement("div");d.textContent=t;return d.innerHTML}
        setInterval(load,5000);
    </script>
</body>
</html>
