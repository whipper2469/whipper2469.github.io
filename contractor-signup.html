<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join SnapFix - Contractor Signup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #0a1628 0%, #1B2B5E 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .signup-container { background: white; padding: 48px; border-radius: 16px; max-width: 500px; width: 100%; box-shadow: 0 12px 48px rgba(0,0,0,0.3); }
        h1 { font-size: 32px; color: #1B2B5E; margin-bottom: 12px; }
        .subtitle { color: #6b7280; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: #1B2B5E; margin-bottom: 8px; font-size: 14px; }
        input, select { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 16px; transition: border-color 0.2s; }
        input:focus, select:focus { outline: none; border-color: #FF6535; }
        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; font-weight: 400; cursor: pointer; }
        .checkbox-label input[type="checkbox"] { width: auto; }
        .submit-btn { width: 100%; padding: 16px; background: #FF6535; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 24px; }
        .submit-btn:hover { background: #ff7d5c; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .message.success { background: #d1fae5; color: #065f46; }
        .message.error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="signup-container">
        <h1>Join SnapFix</h1>
        <p class="subtitle">Get matched with homeowners across Ontario who need your services</p>
        
        <div id="message"></div>
        
        <form id="signupForm">
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" placeholder="(519) 555-1234" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="form-group">
                <label for="postal">Postal Code *</label>
                <input type="text" id="postal" placeholder="N2L 3G1" maxlength="7" required>
            </div>
            
            <div class="form-group">
                <label>Services Offered *</label>
                <div class="services-grid">
                    <label class="checkbox-label">
                        <input type="checkbox" name="services" value="Plumbing"> Plumbing
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="services" value="Electrical"> Electrical
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="services" value="HVAC"> HVAC
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="services" value="Roofing"> Roofing
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="services" value="Drywall"> Drywall
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="services" value="Painting"> Painting
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="services" value="Flooring"> Flooring
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="services" value="General Repair"> General Repair
                    </label>
                </div>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">Join SnapFix Network</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(
            'https://japlrtlpopefvgkecpif.supabase.co',
            'sb_publishable_9OnHkGpoUUG5dj7FDsnI-g_zwsjgpqG'
        );

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const postal = document.getElementById('postal').value.trim().toUpperCase();
            
            const serviceCheckboxes = document.querySelectorAll('input[name="services"]:checked');
            const services = Array.from(serviceCheckboxes).map(cb => cb.value);
            
            if (services.length === 0) {
                showMessage('Please select at least one service', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Joining...';
            
            try {
                const { data, error } = await supabase
                    .from('contractors')
                    .insert([{ name, phone, email, postal_code: postal, services }]);
                
                if (error) throw error;
                
                showMessage('🎉 Welcome to SnapFix! We\'ll be in touch soon.', 'success');
                document.getElementById('signupForm').reset();
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Join SnapFix Network';
            }
        });
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            setTimeout(() => msg.textContent = '', 5000);
        }
    </script>
</body>
</html>
