<!DOCTYPE html>
<html lang="en" class="bg-zinc-950 text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Spades • Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen flex flex-col">
  <div id="lobby" class="flex-1 flex items-center justify-center">
    <div class="text-center">
      <h1 class="text-7xl font-bold mb-4 tracking-tighter">ELITE SPADES</h1>
      <div class="space-x-4">
        <button onclick="startGame('ai')" class="px-8 py-4 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-xl font-semibold">Play vs 3 AI</button>
        <button onclick="startGame('partner')" class="px-8 py-4 bg-amber-600 hover:bg-amber-500 rounded-xl text-xl font-semibold">Play with Friend + 2 AI</button>
      </div>
    </div>
  </div>

  <div id="game" class="hidden flex-1 flex flex-col">
    <!-- Top Bar -->
    <div class="bg-zinc-900 p-4 flex justify-between items-center">
      <div>Score: <span id="team1-score" class="font-mono">0</span> — <span id="team2-score" class="font-mono">0</span></div>
      <div id="trick-info" class="font-mono"></div>
      <button onclick="endGame()" class="text-red-400">End Game</button>
    </div>

    <!-- Table -->
    <div id="table" class="flex-1 relative bg-[url('assets/table-bg.jpg')] bg-cover flex items-center justify-center overflow-hidden">
      <canvas id="canvas" width="1200" height="800" class="shadow-2xl rounded-3xl"></canvas>
      
      <!-- Player Areas -->
      <div id="players" class="absolute inset-0 pointer-events-none"></div>
    </div>

    <!-- Controls -->
    <div class="bg-zinc-900 p-4">
      <div id="bidding" class="hidden">Bid: <input id="bid-input" type="number" min="0" max="13" value="0"> <button onclick="submitBid()">Bid</button></div>
      <div id="hand" class="flex gap-2 justify-center"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
