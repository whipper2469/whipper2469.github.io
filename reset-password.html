<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – Home Repair AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
    }

    .logo-wrap {
      margin: 0 auto 24px;
      width: 100%;
      max-width: 320px;
    }

    .logo-wrap svg {
      width: 100%;
      height: auto;
    }

    .greeting {
      font-size: 15px;
      color: #64748b;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .greeting span {
      font-weight: 600;
      color: #0284c7;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
      color: #1e293b;
    }

    input[type="password"]:focus {
      border-color: #FF6535;
      box-shadow: 0 0 0 3px rgba(255, 101, 53, 0.1);
    }

    .error-hint {
      font-size: 12px;
      color: #ef4444;
      margin-top: 4px;
      display: none;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FF6535, #e04e20);
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }

    .message.success {
      background: #f0fdf4;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    .message.error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
    }

    .app-link {
      margin-top: 24px;
      font-size: 13px;
      color: #94a3b8;
    }

    .app-link a {
      color: #FF6535;
      text-decoration: none;
      font-weight: 600;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
      <svg viewBox="0 0 680 305" xmlns="http://www.w3.org/2000/svg">
        <style>
          .hb { fill: #1B2B5E; }
          .rline { stroke: #FF6535; fill: none; stroke-width: 2.5; stroke-linecap: round; }
          .rnode { fill: #FF6535; }
          .rinner { fill: white; }
          .win { fill: none; stroke: rgba(255,255,255,0.4); stroke-width: 1.5; }
          .wcross { stroke: rgba(255,255,255,0.25); stroke-width: 1; fill: none; }
          .door { fill: #FF6535; }
          .wt1 { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #1B2B5E; letter-spacing: 5px; }
          .wt2 { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #1B2B5E; letter-spacing: 5px; }
          .aipill { fill: #FF6535; }
          .aitxt { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: 700; fill: white; letter-spacing: 2px; }
          .sub-txt { font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: 400; fill: #7A8FB8; letter-spacing: 8px; }
        </style>
        <polygon points="340,50 418,120 418,220 262,220 262,120" class="hb"/>
        <line x1="340" y1="50" x2="262" y2="120" class="rline"/>
        <line x1="340" y1="50" x2="418" y2="120" class="rline"/>
        <line x1="262" y1="120" x2="418" y2="120" stroke="#FF6535" stroke-width="1" stroke-opacity="0.25" fill="none"/>
        <circle cx="340" cy="50" r="9" class="rnode"/>
        <circle cx="340" cy="50" r="3.5" class="rinner"/>
        <circle cx="262" cy="120" r="6.5" class="rnode"/>
        <circle cx="262" cy="120" r="2.5" class="rinner"/>
        <circle cx="418" cy="120" r="6.5" class="rnode"/>
        <circle cx="418" cy="120" r="2.5" class="rinner"/>
        <rect x="272" y="132" width="40" height="34" rx="2" class="win"/>
        <line x1="292" y1="132" x2="292" y2="166" class="wcross"/>
        <line x1="272" y1="149" x2="312" y2="149" class="wcross"/>
        <rect x="368" y="132" width="40" height="34" rx="2" class="win"/>
        <line x1="388" y1="132" x2="388" y2="166" class="wcross"/>
        <line x1="368" y1="149" x2="408" y2="149" class="wcross"/>
        <rect x="317" y="167" width="46" height="53" rx="4" class="door"/>
        <circle cx="329" cy="195" r="2.8" fill="white" opacity="0.65"/>
        <text x="340" y="251" text-anchor="middle" class="wt1">HOME REPAIR</text>
        <text x="267" y="281" text-anchor="start" class="wt2">HELPER</text>
        <rect x="377" y="263" width="40" height="22" rx="11" class="aipill"/>
        <text x="397" y="278" text-anchor="middle" class="aitxt">AI</text>
        <text x="340" y="300" text-anchor="middle" class="sub-txt">KITCHENER · WATERLOO</text>
      </svg>
    </div>

    <p class="greeting" id="greeting">Please enter your new password below.</p>

    <div id="form-section">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" />
        <div class="error-hint" id="len-hint">Password must be at least 8 characters.</div>
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" placeholder="Re-enter your password" autocomplete="new-password" />
        <div class="error-hint" id="match-hint">Passwords do not match.</div>
      </div>

      <button id="save-btn" onclick="savePassword()">Save New Password</button>
    </div>

    <div class="message" id="message"></div>

    <p class="app-link">
      After resetting, open the <a href="com.kevinroy.HomeRepairHelper://">Home Repair AI app</a> to sign in.
    </p>
  </div>

  <script>
    const SUPABASE_URL = "https://japlrtlpopefvgkecpif.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImphcGxydGxwb3BlZnZna2VjcGlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3Njc1NTcsImV4cCI6MjA4NzM0MzU1N30.q0JVwQJdJcpNUcyt2opxE-yRlhBnWdO3oq4IUMk6L5M";

    let accessToken = null;

    function getTokensFromURL() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      return {
        access_token: params.get("access_token"),
        refresh_token: params.get("refresh_token"),
        type: params.get("type")
      };
    }

    window.onload = function() {
      const { access_token, type } = getTokensFromURL();
      if (type === "recovery" && access_token) {
        accessToken = access_token;
        document.getElementById("greeting").innerHTML = "Please choose a new password for your account.";
      } else {
        document.getElementById("form-section").style.display = "none";
        showMessage("This reset link has expired or is invalid. Please request a new one from the app.", "error");
      }
    };

    async function savePassword() {
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;

      document.getElementById("len-hint").style.display = "none";
      document.getElementById("match-hint").style.display = "none";

      if (password.length < 8) {
        document.getElementById("len-hint").style.display = "block";
        return;
      }
      if (password !== confirm) {
        document.getElementById("match-hint").style.display = "block";
        return;
      }

      const btn = document.getElementById("save-btn");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Saving…';

      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${accessToken}`
          },
          body: JSON.stringify({ password })
        });

        const data = await res.json();

        if (res.ok) {
          document.getElementById("form-section").style.display = "none";
          showMessage("✓ Password updated successfully! You can now open the app and sign in with your new password.", "success");
        } else {
          btn.disabled = false;
          btn.innerHTML = "Save New Password";
          showMessage(data.message || "Something went wrong. Please try again.", "error");
        }
      } catch (e) {
        btn.disabled = false;
        btn.innerHTML = "Save New Password";
        showMessage("Network error. Please check your connection and try again.", "error");
      }
    }

    function showMessage(text, type) {
      const el = document.getElementById("message");
      el.textContent = text;
      el.className = `message ${type}`;
      el.style.display = "block";
    }
  </script>
</body>
</html>
