<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapFix - AI-Powered Home Repair Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #1B2B5E;
            --orange: #FF6535;
            --light-blue: #2A3F7E;
            --dark-navy: #0F1A3D;
            --cream: #FFF8F0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, var(--navy) 0%, var(--dark-navy) 100%);
            color: var(--cream);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background-orbs {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            opacity: 0.4;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 101, 53, 0.3), transparent);
            top: -200px;
            left: -200px;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(42, 63, 126, 0.4), transparent);
            bottom: -250px;
            right: -250px;
            animation-delay: 5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 101, 53, 0.2), transparent);
            top: 50%;
            right: 20%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(15, 26, 61, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 248, 240, 0.1);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
        }

        .logo-text span:first-child {
            color: var(--cream);
        }

        .logo-text span:last-child {
            color: var(--orange);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-cta {
            background: linear-gradient(135deg, var(--orange) 0%, #E65530 100%);
            color: white !important;
            padding: 14px 32px;
            border-radius: 100px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(255, 101, 53, 0.3);
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            cursor: pointer;
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 101, 53, 0.5);
        }

        .hero {
            position: relative;
            z-index: 1;
            padding-top: 180px;
            padding-bottom: 80px;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 60px;
            padding-right: 60px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 101, 53, 0.12);
            border: 1.5px solid rgba(255, 101, 53, 0.3);
            color: var(--orange);
            padding: 12px 28px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 60px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 96px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 32px;
            letter-spacing: -3px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .highlight {
            background: linear-gradient(135deg, var(--orange) 0%, #FFB020 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 24px;
            color: rgba(255, 248, 240, 0.7);
            max-width: 750px;
            margin: 0 auto 40px;
            line-height: 1.7;
            font-weight: 400;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .domain-notice {
            display: inline-block;
            background: rgba(255, 248, 240, 0.08);
            border: 1px solid rgba(255, 248, 240, 0.15);
            padding: 16px 32px;
            border-radius: 16px;
            margin-bottom: 60px;
            animation: fadeInUp 0.8s ease-out 0.5s both;
        }

        .domain-notice p {
            font-size: 16px;
            color: rgba(255, 248, 240, 0.8);
            margin-bottom: 8px;
        }

        .domain-notice a {
            color: var(--orange);
            text-decoration: none;
            font-weight: 600;
            font-size: 20px;
            transition: opacity 0.3s;
        }

        .domain-notice a:hover {
            opacity: 0.8;
        }

        .cta-buttons {
            display: flex;
            gap: 24px;
            justify-content: center;
            margin-bottom: 80px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .btn {
            padding: 20px 44px;
            border-radius: 100px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--orange) 0%, #E65530 100%);
            color: white;
            box-shadow: 0 10px 40px rgba(255, 101, 53, 0.4);
            position: relative;
            z-index: 1;
        }

        .btn-primary:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 50px rgba(255, 101, 53, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 248, 240, 0.08);
            color: var(--cream);
            border: 2px solid rgba(255, 248, 240, 0.2);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 248, 240, 0.15);
            border-color: rgba(255, 248, 240, 0.4);
            transform: translateY(-4px);
        }

        .app-icon-section {
            animation: fadeInUp 0.8s ease-out 0.8s both;
        }

        .app-icon-container {
            position: relative;
            display: inline-block;
        }

        .app-icon-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 101, 53, 0.3), transparent);
            filter: blur(50px);
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        .app-icon-svg {
            position: relative;
            z-index: 2;
            width: 240px;
            height: 240px;
            filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.5));
            animation: iconFloat 4s infinite ease-in-out;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .chat-button {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: linear-gradient(135deg, var(--orange) 0%, #E65530 100%);
            color: white;
            padding: 18px 36px;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 30px rgba(255, 101, 53, 0.5);
            transition: all 0.3s ease;
            z-index: 999;
            cursor: pointer;
            border: none;
            font-family: 'DM Sans', sans-serif;
        }

        .chat-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(255, 101, 53, 0.7);
        }

        .chat-icon {
            width: 20px;
            height: 20px;
        }

        .chat-modal {
            display: none;
            position: fixed;
            bottom: 120px;
            right: 40px;
            width: 400px;
            height: 600px;
            background: rgba(15, 26, 61, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 248, 240, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            z-index: 998;
            flex-direction: column;
        }

        .chat-modal.active {
            display: flex;
        }

        .chat-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 248, 240, 0.1);
        }

        .chat-header h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            margin-bottom: 8px;
        }

        .chat-header p {
            font-size: 14px;
            color: rgba(255, 248, 240, 0.6);
        }

        .chat-body {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .chat-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 248, 240, 0.9);
        }

        .form-group input,
        .form-group textarea {
            background: rgba(255, 248, 240, 0.05);
            border: 1px solid rgba(255, 248, 240, 0.15);
            border-radius: 12px;
            padding: 14px;
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--orange);
            background: rgba(255, 248, 240, 0.08);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--orange) 0%, #E65530 100%);
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'DM Sans', sans-serif;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 101, 53, 0.5);
        }

        @media (max-width: 768px) {
            .nav-container {
                padding: 20px 24px;
            }

            .logo {
                font-size: 24px;
            }

            .hero {
                padding-top: 140px;
                padding-left: 24px;
                padding-right: 24px;
            }

            h1 {
                font-size: 52px;
            }

            .subtitle {
                font-size: 18px;
            }

            .cta-buttons {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .app-icon-svg {
                width: 180px;
                height: 180px;
            }

            .chat-button {
                bottom: 24px;
                right: 24px;
                padding: 16px 28px;
                font-size: 14px;
            }

            .chat-modal {
                bottom: 100px;
                right: 24px;
                left: 24px;
                width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <nav>
        <div class="nav-container">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="url(#logoGrad)"/>
                    <path d="M20 10L14 14V22L20 26L26 22V14L20 10Z" fill="white" fill-opacity="0.95"/>
                    <path d="M20 18L17 20V24L20 26L23 24V20L20 18Z" fill="#FF6535"/>
                    <defs>
                        <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
                            <stop offset="0%" stop-color="#1B2B5E"/>
                            <stop offset="100%" stop-color="#2A3F7E"/>
                        </linearGradient>
                    </defs>
                </svg>
                <div class="logo-text">
                    <span>Snap</span><span>Fix</span>
                </div>
            </div>
            <div class="nav-links">
                <button onclick="toggleChat()" class="nav-cta">Try Demo</button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="badge">🚀 Coming Soon to iOS & Android</div>
        
        <h1>
            Snap it.<br>
            <span class="highlight">Fix it.</span>
        </h1>
        
        <p class="subtitle">
            AI-powered home repair diagnosis in seconds. Snap a photo, get instant answers, and connect with trusted local contractors.
        </p>

        <div class="domain-notice">
            <p>Full app launching at</p>
            <a href="https://snapfix.homes" target="_blank">snapfix.homes</a>
        </div>
        
        <div class="cta-buttons">
            <button onclick="toggleChat()" class="btn btn-primary">Try Demo Chat</button>
            <a href="mailto:kevin@snapfix.homes?subject=Waitlist%20Signup" class="btn btn-secondary">Join Waitlist</a>
        </div>
        
        <div class="app-icon-section">
            <div class="app-icon-container">
                <div class="app-icon-glow"></div>
                <svg class="app-icon-svg" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="240" height="240" rx="56" fill="url(#appGradient)"/>
                    <path d="M120 55L180 95V175H150V135H90V175H60V95L120 55Z" 
                          fill="white" fill-opacity="0.15"/>
                    <g transform="translate(85, 100)">
                        <path d="M35 10L45 0L70 25L60 35L50 25L20 55L10 45L40 15L35 10Z" 
                              fill="white" stroke="white" stroke-width="2" stroke-linejoin="miter"/>
                        <path d="M65 30L70 25L75 30L75 35L70 40L65 35L65 30Z" 
                              fill="none" stroke="white" stroke-width="3" stroke-linejoin="miter"/>
                        <circle cx="15" cy="50" r="4" fill="#FF6535">
                            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="25" cy="60" r="3" fill="#FFB020">
                            <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="5" cy="60" r="3.5" fill="#FF6535">
                            <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
                        </circle>
                    </g>
                    <defs>
                        <linearGradient id="appGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#1B2B5E"/>
                            <stop offset="100%" style="stop-color:#2A3F7E"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
        </div>
    </section>

    <div class="chat-modal" id="chatModal">
        <div class="chat-header">
            <h3>Try SnapFix Demo</h3>
            <p>Describe your home repair issue</p>
        </div>
        <div class="chat-body">
            <form class="chat-form" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label>What needs fixing?</label>
                    <textarea placeholder="E.g., My kitchen faucet is leaking..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Your Email</label>
                    <input type="email" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="submit-btn">Get AI Diagnosis</button>
            </form>
        </div>
    </div>

    <button onclick="toggleChat()" class="chat-button">
        <svg class="chat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
        <span id="chatButtonText">Try Demo</span>
    </button>

    <script>
        function toggleChat() {
            const modal = document.getElementById('chatModal');
            const buttonText = document.getElementById('chatButtonText');
            modal.classList.toggle('active');
            buttonText.textContent = modal.classList.contains('active') ? 'Close' : 'Try Demo';
        }

        function handleSubmit(event) {
            event.preventDefault();
            alert('Demo mode! Full chat will be available at snapfix.homes soon.');
            toggleChat();
        }

        document.addEventListener('click', function(event) {
            const modal = document.getElementById('chatModal');
            const chatButton = document.querySelector('.chat-button');
            const navCta = document.querySelector('.nav-cta');
            
            if (!modal.contains(event.target) && 
                !chatButton.contains(event.target) && 
                !navCta.contains(event.target) &&
                !event.target.closest('.btn-primary')) {
                modal.classList.remove('active');
                document.getElementById('chatButtonText').textContent = 'Try Demo';
            }
        });
    </script>
</body>
</html>
